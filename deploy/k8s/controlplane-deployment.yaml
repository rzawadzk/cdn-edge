apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdn-controlplane
  labels:
    app.kubernetes.io/name: cdn-controlplane
    app.kubernetes.io/component: controlplane
    app.kubernetes.io/part-of: cdn
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cdn-controlplane
      app.kubernetes.io/component: controlplane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cdn-controlplane
        app.kubernetes.io/component: controlplane
        app.kubernetes.io/part-of: cdn
    spec:
      containers:
        - name: controlplane
          image: cdn-controlplane:latest
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cdn-config
            - secretRef:
                name: cdn-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
          volumeMounts:
            - name: data
              mountPath: /data/cp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cdn-controlplane-data
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cdn-controlplane-data
  labels:
    app.kubernetes.io/name: cdn-controlplane
    app.kubernetes.io/component: controlplane
    app.kubernetes.io/part-of: cdn
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
