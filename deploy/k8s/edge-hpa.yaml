apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cdn-edge
  labels:
    app.kubernetes.io/name: cdn-edge
    app.kubernetes.io/component: edge
    app.kubernetes.io/part-of: cdn
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cdn-edge
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
