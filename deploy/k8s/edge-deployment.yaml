apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdn-edge
  labels:
    app.kubernetes.io/name: cdn-edge
    app.kubernetes.io/component: edge
    app.kubernetes.io/part-of: cdn
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cdn-edge
      app.kubernetes.io/component: edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cdn-edge
        app.kubernetes.io/component: edge
        app.kubernetes.io/part-of: cdn
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - cdn-edge
                topologyKey: kubernetes.io/hostname
      containers:
        - name: edge
          image: cdn-edge:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cdn-config
            - secretRef:
                name: cdn-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
      terminationGracePeriodSeconds: 30
